<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一個 Numberblocks 網頁</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
        }
        .block {
            width: 100px;
            height: 100px;
            background-color: red;
            color: white;
            display: inline-block;
            line-height: 100px;
            font-size: 24px;
            font-weight: bold;
            margin: 20px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px #999;
        }
        .block:active {
            background-color: #cc0000;
            box-shadow: 0 2px #666;
            transform: translateY(3px);
        }
    </style>
</head>
<body>

    <h1>Numberblocks 測試</h1>
    <p>試下點擊下面個方塊：</p>

    <div class="block" onclick="sayOne()">1</div>

    <script>
        // JavaScript 互動功能
        function sayOne() {
            alert("One! 一！");
            // 未來你可以換成播放聲音檔：new Audio('one.mp3').play();
        }
    </script>

</body>
</html>
